name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install CPU PyTorch
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Run unit tests
        run: python -m unittest tests.unit.test_preconditioners

  elpa-binding-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            gfortran \
            libopenmpi-dev \
            libopenblas-dev \
            libscalapack-openmpi-dev \
            libtool \
            openmpi-bin
      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mpi4py ninja numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Build ELPA
        env:
          ELPA_CONFIGURE_ARGS: >-
            --disable-sse-kernels
            --disable-sse-assembly-kernels
            --disable-avx-kernels
            --disable-avx2-kernels
            --disable-avx512-kernels
        # ELPA's generated Fortran dependency graph omits the dependency from
        # its GPU test-support module to cuda_functions.mod. Build serially so
        # the main library creates that module before the test support compiles.
        run: BUILD_JOBS=1 ./scripts/build_elpa.sh cpu
      - name: Compile and test the ELPA binding
        env:
          MAX_JOBS: "2"
        run: python -m unittest tests.unit.test_elpa_bindings

  slate-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gfortran \
            libopenblas-dev \
            libopenmpi-dev \
            openmpi-bin
          python -m pip install --upgrade pip
          pip install mpi4py ninja pybind11
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Build and install SLATE
        run: BUILD_JOBS=2 ./scripts/build_slate.sh cpu
      - name: Compile and test the SLATE binding
        env:
          OMP_NUM_THREADS: "1"
          WORLD_SIZE: "8"
        run: python -m unittest tests.unit.test_slate_bindings
