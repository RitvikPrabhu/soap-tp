name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install CPU PyTorch
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Run unit tests
        run: python -m unittest tests.unit.test_preconditioners

  elpa-binding-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            gfortran \
            libopenmpi-dev \
            libopenblas-dev \
            libscalapack-openmpi-dev \
            libtool \
            openmpi-bin
      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mpi4py ninja
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Build ELPA
        run: BUILD_JOBS=2 ./scripts/build_elpa.sh cpu
      - name: Compile and test the ELPA binding
        env:
          MAX_JOBS: "2"
        run: python -m unittest tests.unit.test_elpa_bindings
