name: tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate installation entry points
        run: |
          bash -n install.sh scripts/*.sh
          ./install.sh --help
      - name: Install CPU PyTorch
        run: |
          python -m pip install --upgrade pip
          pip install numpy
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Run unit tests
        run: >-
          python -m unittest
          tests.unit.test_preconditioners
          tests.unit.test_optimizer
          tests.unit.test_soap

  cpu-bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            cmake \
            gfortran \
            libopenmpi-dev \
            libopenblas-dev \
            libscalapack-openmpi-dev \
            libtool \
            openmpi-bin
      - name: Bootstrap a fresh CPU installation
        env:
          # Keep ELPA serial: its generated Fortran dependency graph omits a
          # module edge and can race under a parallel first build.
          BUILD_JOBS: "1"
          ELPA_CONFIGURE_ARGS: >-
            --disable-sse-kernels
            --disable-sse-assembly-kernels
            --disable-avx-kernels
            --disable-avx2-kernels
            --disable-avx512-kernels
        run: ./install.sh cpu
      - name: Verify the installed checkout and native backends
        run: |
          .venv/bin/python - <<'PY'
          import inspect
          from pathlib import Path

          import soap_tp
          import torch
          import torch.distributed as dist
          from soap_tp import elpa_bindings, slate_bindings

          root = Path.cwd().resolve()
          package = Path(soap_tp.__file__).resolve()
          if root not in package.parents:
              raise SystemExit(f"soap_tp is not editable from {root}: {package}")
          if "group_peer" not in inspect.signature(dist.P2POp).parameters:
              raise SystemExit(
                  f"PyTorch {torch.__version__} lacks P2POp(group_peer=...)"
              )
          assert elpa_bindings.compiled_gpu_backend() == "none"
          assert slate_bindings.compiled_gpu_backend() == "none"
          print(f"PyTorch: {torch.__version__}")
          print(f"editable package: {package}")
          PY
      - name: Run the complete unit suite
        timeout-minutes: 20
        env:
          MAX_JOBS: "2"
          MKL_NUM_THREADS: "1"
          OMP_NUM_THREADS: "4"
          OPENBLAS_NUM_THREADS: "1"
          WORLD_SIZE: "4"
        run: .venv/bin/python -m unittest discover -s tests/unit -v -f
